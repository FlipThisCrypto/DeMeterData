; The Orchard — Tree firmware
; PlatformIO project for ESP32-S3 (Freenove dev board or compatible).
;
; Build / flash:
;   pio run                    # build
;   pio run -t upload          # flash over USB
;   pio device monitor         # serial console at 115200
;
; Library docs: https://docs.platformio.org/en/latest/projectconf/index.html

[platformio]
default_envs = freenove_esp32s3

; -------------------------------------------------------------------
; Common settings shared by all envs.
[env]
framework = arduino
monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder, time
lib_deps =
    bblanchon/ArduinoJson@^7.0.4
    mikalhart/TinyGPSPlus@^1.0.3

; -------------------------------------------------------------------
; Primary target: Freenove ESP32-S3 (uses the generic S3-DevKitC-1
; board target — pin mappings line up with Freenove's S3 dev board).
[env:freenove_esp32s3]
platform = espressif32@^6.7.0
board = esp32-s3-devkitc-1
; Native-USB CDC so Serial works over the dev board's USB port,
; and C++17 (Arduino-ESP32 v2.x defaults to gnu++11 which lacks
; std::make_unique used by our sensor AutoRegister<>).
build_unflags =
    -std=gnu++11
build_flags =
    -std=gnu++17
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ORCHARD_FIRMWARE_VERSION=\"0.1.0\"
; Custom partitions: room for OTA + NVS + small SPIFFS.
board_build.partitions = partitions.csv
; Defaults; override per-board if you have 4MB flash.
board_upload.flash_size = 8MB
board_build.flash_size = 8MB
