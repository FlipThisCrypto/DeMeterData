; The Orchard — Tree firmware
; PlatformIO project supporting both classic ESP32 (WROOM-32 / WROOM-32U)
; and ESP32-S3 (Freenove S3 etc.).
;
; Default env is the WROOM-32U because that's what's in the v1
; prototype enclosure. To target an S3 board, override on the CLI:
;   pio run -e freenove_esp32s3 -t upload --upload-port COM7
;
; Build / flash:
;   pio run                    # build with default env (WROOM-32U)
;   pio run -t upload          # flash over USB
;   pio device monitor         # serial console at 115200
;
; Library docs: https://docs.platformio.org/en/latest/projectconf/index.html

[platformio]
default_envs = freenove_esp32_wroom

; -------------------------------------------------------------------
; Common settings shared by all envs.
[env]
framework = arduino
monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder, time
lib_deps =
    bblanchon/ArduinoJson@^7.0.4
    mikalhart/TinyGPSPlus@^1.0.3
    adafruit/Adafruit BME280 Library@^2.2.4
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.11.0
; Arduino-ESP32 v2.x defaults to gnu++11; our sensor.h uses
; std::make_unique (C++14+). Bump to C++17 across all envs.
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -D ORCHARD_FIRMWARE_VERSION=\"0.2.0\"

; -------------------------------------------------------------------
; Primary target: ESP32-WROOM-32 / -32U (classic ESP32).
; This is the v1 prototype board (in the enclosure with GPS + MQ-135).
; 4MB flash. No native USB — Serial flows through the CP210x bridge.
; Status LED on GPIO 2 (Freenove convention).
;
; Flash mode / freq are pinned conservatively:
;   * dio + 40MHz works on every WROOM-32 variant we've seen.
;   * The PlatformIO esp32dev default (qio + 80MHz) is faster but is
;     marginal on some Freenove boards — it leads to intermittent
;     `flash read err, 1000` bootloops.
;   * If you have a known-good board, you can try the faster combo
;     with: -D `board_build.flash_mode = qio` etc.
[env:freenove_esp32_wroom]
platform = espressif32@^6.7.0
board = esp32dev
build_flags =
    ${env.build_flags}
    -D ORCHARD_PIN_STATUS_LED=2
    ; This breakout doesn't expose ESP32 UART2 defaults (GPIO 16/17).
    ; Move GPS UART to GPIO 18/19 (both real output-capable pins on
    ; the right header, no strapping role).
    -D ORCHARD_PIN_GPS_RX=18
    -D ORCHARD_PIN_GPS_TX=19
board_build.flash_mode = dio
board_build.flash_freq = 40m
; Uses Arduino-ESP32's built-in default.csv partition table
; (4MB OTA-capable). No custom partitions.csv needed.

; -------------------------------------------------------------------
; Secondary target: Freenove ESP32-S3 (8MB flash, native USB-CDC,
; status LED on GPIO 48). Not currently the v1 prototype, but kept
; here so we can flash an S3 Tree when one is wired up.
[env:freenove_esp32s3]
platform = espressif32@^6.7.0
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ORCHARD_PIN_STATUS_LED=48
board_build.partitions = partitions.csv
board_upload.flash_size = 8MB
board_build.flash_size = 8MB
